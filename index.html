<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 앱 헤더 -->
        <header>
            <h1>My Todo</h1>
        </header>

        <!-- 메인 영역 (입력 폼 및 리스트) -->
        <main>
            <!-- 주간 뷰 컨트롤러 -->
            <div class="weekly-controller">
                <button id="prev-week-btn" class="btn-icon">&lt;</button>
                <div id="weekly-calendar" class="weekly-calendar"></div>
                <button id="next-week-btn" class="btn-icon">&gt;</button>
            </div>

            <!-- Todo 입력 폼 -->
            <form id="todo-form" class="todo-form">
                <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." autocomplete="off">
                <button type="submit" class="btn-add">추가</button>
            </form>

            <!-- 안내 메시지 (에러 등) -->
            <div id="message-container" class="message-container"></div>

            <!-- 필터링 탭 -->
            <div class="filter-tabs" id="filter-tabs">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="active">진행 중</button>
                <button class="filter-btn" data-filter="completed">완료</button>
            </div>

            <!-- Todo 리스트 출력 영역 -->
            <ul id="todo-list" class="todo-list">
                <!-- 자바스크립트로 리스트가 여기에 렌더링 됩니다 -->
            </ul>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
